services:
  postgres:
    image: postgres:16-alpine
    container_name: jimpitan-postgres
    restart: always
    environment:
      POSTGRES_USER: jimpitan_user
      POSTGRES_PASSWORD: jimpitan_pass
      POSTGRES_DB: jimpitan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jimpitan_user -d jimpitan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
